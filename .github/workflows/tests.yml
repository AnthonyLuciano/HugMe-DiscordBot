name: Testes do HugMe Bot

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov

    - name: Executar testes
      run: |
        pytest tests/test_doacoes.py -v --tb=short --cov=bot --cov-report=xml --cov-report=term

    - name: Upload relatório de cobertura
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Verificar cobertura mínima
      run: |
        coverage report --fail-under=70

    - name: Executar testes com output verbose
      if: always()
      run: |
        pytest tests/test_doacoes.py -v

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy

    - name: Executar linting
      run: |
        flake8 bot/ --count --show-source --statistics
        black --check bot/ tests/
        mypy bot/ --no-error-summary

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Executar scan de segurança
      run: |
        bandit -r bot/ -x tests/ -f json -o security-report.json
